name: TEIScanner

options:
  bundleIdPrefix: com.nakamura
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: ja
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: Q6S8JS6GWV
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "0.7.0"
    CURRENT_PROJECT_VERSION: "9"
    PRODUCT_NAME: TEIScanner

targets:
  TEIScanner:
    type: application
    platform: macOS
    sources:
      - path: Sources/TEIScanner
      - path: Resources
        excludes:
          - "Info.plist"
          - "TEIScanner.entitlements"
          - "TEIScanner-Debug.entitlements"
          - "SamplePages/**"
      - path: Resources/SamplePages
        type: folder
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: TEIScanner
        CFBundleDisplayName: TEI Scanner
        CFBundleDevelopmentRegion: ja
        CFBundleLocalizations:
          - ja
          - en
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "© 2026 Satoru Nakamura"
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nakamura.teiscanner
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Resources/TEIScanner.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Resources/TEIScanner-Debug.entitlements
